<!-- TopAppBar -->
<nav class="fixed top-0 w-full z-50 bg-slate-950/60 backdrop-blur-xl flex justify-between items-center px-8 py-6 max-w-full">
<div class="text-2xl font-bold tracking-tighter text-cyan-400 font-['Space_Grotesk']">NOCTURNAL</div>
<div class="hidden md:flex gap-8 items-center font-['Space_Grotesk'] tracking-tight">

<a class="text-slate-400 hover:text-cyan-300 transition-colors duration-300" href="#">Analog</a>

</div>
<div class="flex items-center gap-4">

<span class="material-symbols-outlined text-slate-400 cursor-pointer hover:opacity-80 transition-all">more_vert</span>
</div>
</nav>

<!-- Abstract Decoration -->
<div class="absolute inset-0 flex items-center justify-center opacity-10 pointer-events-none">
<div class="w-[600px] h-[600px] rounded-full border border-primary/20 scale-150"></div>
<div class="absolute w-[400px] h-[400px] rounded-full border border-primary/10"></div>
</div>
<!-- Clock Section -->
<section class="relative z-10 flex flex-col items-center text-center">
<div class="mb-2">
<span class="font-label text-primary/60 tracking-[0.4em] uppercase text-xs font-semibold">GÜNCEL ZAMAN</span>
</div>
<!-- Digital Clock Display -->
<div class="flex flex-col items-center">
<h1 class="font-headline text-[12vw] md:text-[8rem] font-bold leading-none tracking-tighter text-primary text-glow select-none">
                    22:45<span class="text-on-surface-variant font-light text-[6vw] md:text-[4rem] ml-2 opacity-50">:18</span>
</h1>
<div class="mt-8 flex flex-col items-center">
<p class="font-headline text-2xl md:text-3xl text-on-surface-variant font-medium tracking-tight">
                        24 MAYIS 2024
                    </p>
<div class="mt-4 flex items-center gap-4 text-primary/80">
<span class="w-12 h-[1px] bg-primary/30"></span>
<p class="font-label text-sm uppercase tracking-widest font-light">Cuma</p>
<span class="w-12 h-[1px] bg-primary/30"></span>
</div>
</div>
</div>
<!-- Focus Controls / Asymmetric Detail -->
<div class="mt-20 grid grid-cols-1 md:grid-cols-3 gap-6 w-full max-w-2xl">
<div class="bg-surface-container-low rounded-xl p-6 flex flex-col items-center justify-center gap-3 group hover:bg-surface-container-high transition-colors duration-500">
<span class="material-symbols-outlined text-primary group-hover:scale-110 transition-transform">alarm</span>
<div class="text-center">
<span class="block font-headline text-lg font-medium text-on-surface">07:30</span>
<span class="block font-label text-[10px] uppercase text-on-surface-variant">Sıradaki Alarm</span>
</div>
</div>
<div class="bg-surface-container-low rounded-xl p-6 flex flex-col items-center justify-center gap-3 group hover:bg-surface-container-high transition-colors duration-500">

<div class="text-center">
<span class="block font-headline text-lg font-medium text-on-surface">25:00</span>
<span class="block font-label text-[10px] uppercase text-on-surface-variant">Odaklanma</span>
</div>
</div>
<div class="bg-surface-container-low rounded-xl p-6 flex flex-col items-center justify-center gap-3 group hover:bg-surface-container-high transition-colors duration-500">
<span class="material-symbols-outlined text-primary group-hover:scale-110 transition-transform">schedule</span>
<div class="text-center">
<span class="block font-headline text-lg font-medium text-on-surface">19:45</span>
<span class="block font-label text-[10px] uppercase text-on-surface-variant">Londra</span>
</div>
</div>
</div>
</section>

<span class="material-symbols-outlined">settings</span>
<span class="font-['Manrope'] text-[11px] uppercase tracking-widest mt-1">Ayarlar</span>
</a>
