<!DOCTYPE html>

<html class="dark" lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Manrope:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary-fixed-dim": "#1ad0eb",
                    "on-secondary-fixed-variant": "#595c5e",
                    "surface-container-low": "#0c1326",
                    "surface-container-highest": "#1c253e",
                    "primary": "#3adffa",
                    "primary-container": "#00cbe6",
                    "inverse-on-surface": "#4f5469",
                    "tertiary-dim": "#bacae4",
                    "on-secondary-container": "#ced1d2",
                    "tertiary": "#d7e6ff",
                    "surface-variant": "#1c253e",
                    "surface-dim": "#070d1f",
                    "secondary-fixed": "#e0e3e5",
                    "error-container": "#9f0519",
                    "outline": "#6f758b",
                    "on-tertiary-container": "#3c4c61",
                    "secondary-container": "#444749",
                    "inverse-primary": "#006977",
                    "on-background": "#dfe4fe",
                    "inverse-surface": "#faf8ff",
                    "surface-container-high": "#171f36",
                    "secondary-dim": "#d2d5d7",
                    "on-tertiary-fixed": "#29394e",
                    "surface-tint": "#3adffa",
                    "secondary-fixed-dim": "#d2d5d7",
                    "primary-fixed": "#3adffa",
                    "error": "#ff716c",
                    "tertiary-container": "#c8d8f3",
                    "on-surface-variant": "#a5aac2",
                    "primary-dim": "#1ad0eb",
                    "surface-container": "#11192e",
                    "background": "#070d1f",
                    "on-primary-container": "#003d46",
                    "on-tertiary-fixed-variant": "#46556b",
                    "surface-container-lowest": "#000000",
                    "surface": "#070d1f",
                    "error-dim": "#d7383b",
                    "on-primary": "#004b56",
                    "on-tertiary": "#45546a",
                    "surface-bright": "#222b47",
                    "tertiary-fixed-dim": "#bacae4",
                    "on-surface": "#dfe4fe",
                    "tertiary-fixed": "#c8d8f3",
                    "on-secondary-fixed": "#3c4042",
                    "on-error-container": "#ffa8a3",
                    "secondary": "#e0e3e5",
                    "on-primary-fixed": "#00363e",
                    "outline-variant": "#41475b",
                    "on-primary-fixed-variant": "#005561",
                    "on-error": "#490006",
                    "on-secondary": "#4f5254"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Space Grotesk"],
                    "body": ["Manrope"],
                    "label": ["Manrope"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #070d1f;
        }
    </style>
</head>
<body class="font-body text-on-surface antialiased selection:bg-primary/30 min-h-screen">
<!-- TopAppBar -->
<header class="fixed top-0 w-full bg-[#070d1f] flex justify-between items-center px-6 py-4 z-50 bg-slate-900/50 backdrop-blur-xl">
<div class="flex items-center gap-2">
<span class="text-2xl font-['Space_Grotesk'] font-bold tracking-tighter text-[#3adffa]">Kronometre</span>
</div>
<div class="flex items-center gap-6">
<nav class="hidden md:flex gap-8">
<a class="text-slate-400 font-['Space_Grotesk'] font-bold tracking-tight hover:text-[#3adffa] transition-colors duration-300" href="#">Dijital</a>
<a class="text-slate-400 font-['Space_Grotesk'] font-bold tracking-tight hover:text-[#3adffa] transition-colors duration-300" href="#">Analog</a>
<a class="text-[#3adffa] font-['Space_Grotesk'] font-bold tracking-tight" href="#">Ayarlar</a>
</nav>
<button class="material-symbols-outlined text-[#3adffa] transition-all duration-200 active:scale-95" data-icon="account_circle">account_circle</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="pt-24 pb-32 px-6 max-w-2xl mx-auto">
<div class="mb-10">
<h1 class="font-headline text-4xl font-bold tracking-tight mb-2 text-on-surface">Ayarlar</h1>
<p class="text-on-surface-variant font-light">Uygulama deneyiminizi kişiselleştirin.</p>
</div>
<div class="space-y-6">
<!-- Görünüm Bölümü -->
<section class="bg-surface-container-low rounded-xl p-6 transition-all">
<div class="flex items-center gap-3 mb-6">
<span class="material-symbols-outlined text-primary" data-icon="palette">palette</span>
<h2 class="font-headline text-lg font-semibold tracking-wide">Görünüm</h2>
</div>
<div class="space-y-8">
<!-- Saat Görünümü Seçimi -->
<div class="flex flex-col gap-4">
<label class="text-sm font-medium text-on-surface-variant tracking-wider uppercase">Saat Görünümü</label>
<div class="grid grid-cols-2 gap-4">
<button class="group flex flex-col items-center gap-3 p-4 rounded-xl bg-surface-container-high border-2 border-primary ring-4 ring-primary/10">
<span class="material-symbols-outlined text-3xl text-primary" data-icon="schedule">schedule</span>
<span class="font-medium">Dijital</span>
</button>
<button class="group flex flex-col items-center gap-3 p-4 rounded-xl bg-surface-container-high border-2 border-transparent hover:border-outline-variant transition-all">
<span class="material-symbols-outlined text-3xl text-on-surface-variant group-hover:text-primary transition-colors" data-icon="watch">watch</span>
<span class="font-medium text-on-surface-variant">Analog</span>
</button>
</div>
</div>
<!-- Koyu Tema Toggle -->
<div class="flex items-center justify-between py-2">
<div class="flex flex-col">
<span class="font-medium">Koyu Tema</span>
<span class="text-sm text-on-surface-variant">Düşük ışıklı ortamlarda göz yorgunluğunu azaltır.</span>
</div>
<button class="relative inline-flex h-6 w-11 items-center rounded-full bg-primary transition-colors focus:outline-none ring-2 ring-primary/20">
<span class="inline-block h-4 w-4 translate-x-6 transform rounded-full bg-on-primary-fixed transition-transform"></span>
</button>
</div>
</div>
</section>
<!-- Zaman Ayarları Bölümü -->
<section class="bg-surface-container-low rounded-xl p-6 transition-all">
<div class="flex items-center gap-3 mb-6">
<span class="material-symbols-outlined text-primary" data-icon="update">update</span>
<h2 class="font-headline text-lg font-semibold tracking-wide">Zaman ve Format</h2>
</div>
<div class="space-y-6">
<!-- Tarih Formatı -->
<div class="flex flex-col gap-3">
<label class="text-sm font-medium text-on-surface-variant tracking-wider uppercase">Tarih Formatı</label>
<div class="relative">
<select class="w-full appearance-none bg-surface-container-lowest text-on-surface py-3 px-4 pr-10 rounded-xl border-none focus:ring-2 focus:ring-primary/30 transition-all cursor-pointer">
<option>GG/AA/YYYY (31/12/2023)</option>
<option>AA/GG/YYYY (12/31/2023)</option>
<option>YYYY-AA-GG (2023-12-31)</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant" data-icon="expand_more">expand_more</span>
</div>
</div>
<!-- Diğer Ayarlar -->
<div class="flex items-center justify-between py-2">
<div class="flex flex-col">
<span class="font-medium">24 Saat Formatı</span>
<span class="text-sm text-on-surface-variant">Zamanı 00:00 - 23:59 arası gösterir.</span>
</div>
<button class="relative inline-flex h-6 w-11 items-center rounded-full bg-primary transition-colors focus:outline-none ring-2 ring-primary/20">
<span class="inline-block h-4 w-4 translate-x-6 transform rounded-full bg-on-primary-fixed transition-transform"></span>
</button>
</div>
</div>
</section>
<!-- Kaydet Butonu (Bento Stilinde asimetrik alt alan) -->
<div class="flex justify-end pt-4">
<button class="bg-gradient-to-br from-primary to-primary-container text-on-primary-fixed font-bold py-4 px-12 rounded-full shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-95 transition-all">
                    Değişiklikleri Kaydet
                </button>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-3 bg-[#0c1326]/80 backdrop-blur-2xl rounded-t-3xl border-t border-white/5 shadow-[0_-8px_40px_-12px_rgba(58,223,250,0.15)]">
<a class="flex flex-col items-center justify-center text-slate-500 py-2 hover:bg-white/5 transition-all" href="#">
<span class="material-symbols-outlined mb-1" data-icon="schedule">schedule</span>
<span class="font-['Manrope'] text-[10px] uppercase tracking-widest">Dijital</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 py-2 hover:bg-white/5 transition-all" href="#">
<span class="material-symbols-outlined mb-1" data-icon="watch">watch</span>
<span class="font-['Manrope'] text-[10px] uppercase tracking-widest">Analog</span>
</a>
<a class="flex flex-col items-center justify-center bg-[#3adffa]/10 text-[#3adffa] rounded-xl px-6 py-2 transition-all" href="#">
<span class="material-symbols-outlined mb-1" data-icon="settings">settings</span>
<span class="font-['Manrope'] text-[10px] uppercase tracking-widest font-bold">Ayarlar</span>
</a>
</nav>
</body></html>
